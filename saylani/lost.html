<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lost & Found</title>

<style>

  :root{
  --white:#ffffff;
  --blue:#0057a8;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  text-decoration:none;
  font-family: "Inter", sans-serif;
}

body{
  height:50vh;
}

/* MAIN LAYOUT */
.layout{
  display:flex;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:var(--white);
  padding:0 15px 20px 15px; /* this is already no top padding, so good! */
  box-shadow:5px 0 25px rgba(0,0,0,0.08);
  display:flex;
  flex-direction:column;
  align-self:stretch;
}
.sidebar-logo {
  width: 180px; /* bigger logo */
  display: block;
  margin-top: -30px;
}
.logo-section{
  text-align:center;
  margin-bottom:8px;

}
.logo-text{
  font-size:22px;
  font-weight:700;
  color:var(--blue);
}
.logo{
font-size:22px;
font-weight:700;
color:var(--blue);
margin-bottom:40px;
}

.nav-item{
  color:black;
padding:10px 15px;
margin-bottom:6px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
font-weight:500;
}

.nav-item:hover,
.nav-item.active{
  background:linear-gradient(90deg,#0f4c81,#00b894);
  color:white;
}

.Logout {
    color:black;
padding:10px 15px;
margin-bottom:6px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
font-weight:500;
}
.Logout:hover,
.Logout:active{
  background: linear-gradient(135deg, #cd1c08, #270c09);
  color:white;
}
/* RIGHT SIDE */
.content-wrapper{
  flex:1;
  background:linear-gradient(135deg,#0f4c81,#00b894);
  padding:100px;
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

/* CARD */
.card{
  background:white;
  padding:30px;
  border-radius:20px;
  width:1150px;
      min-height:600px;
  max-width:100%;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card h2{
  margin-bottom:25px;
}

/* FORM */
.row{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.input-group{
  flex:1;
  display:flex;
  flex-direction:column;
}

.input-group.full{
  margin-bottom:20px;
}

label{
  font-size:14px;
  margin-bottom:6px;
}

input,select,textarea{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #ddd;
}

input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:#00b894;
}

.submit-btn{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,#0f4c81,#00b894);
  color:white;
  cursor:pointer;
  margin-top:10px;
}







/* HAMBURGER */
.hamburger{
  display:none;
  position:fixed;
  top:15px;
  left:15px;
  font-size:28px;
  color:#fff;
  cursor:pointer;
  z-index:1001;
}

/* RESPONSIVE */
@media (max-width: 992px){

  .hamburger{
    display:block;
  }

  .layout{
    flex-direction:column;
  }

  .sidebar{
    position:fixed;
    left:-260px;
    top:0;
    height:100vh;
    z-index:1000;
    transition:0.4s ease;
  }

  .sidebar.active{
    left:0;
  }

  .content-wrapper{
    padding:80px 20px 20px 20px;
  }

  .card{
    width:100%;
    padding:20px;
  }

  .row{
    flex-direction:column;
  }

}
</style>
</head>

<body>

<div class="layout">
<div class="hamburger">☰</div>
        <div class="sidebar">
  <div class="logo-section">
    <img src="images/images-removebg-preview.png" alt="Logo" class="sidebar-logo">
  </div>

<a href="student.html" class="nav-item">Dashboard</a>
 <a href="quiz.html"class="nav-item">Quiz</a>
  <a href="adminlost.html" class="nav-item active">Lost and Found</a>
   <a href="complainstudent.html"class="nav-item">Complaints</a>
   <a href="learn.html"class="nav-item ">Learn</a>
  <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
  <a href="index.html" class="Logout">Logout</a>
</div>



  <!-- RIGHT CONTENT -->
  <div class="content-wrapper">
    <div class="card">
      
      <h2>Report Lost Item</h2>

      <form>

        <div class="row">
          <div class="input-group">
            <label>Item Name</label>
            <input type="text" placeholder="Enter item name">
          </div>

          <div class="input-group">
            <label>Category</label>
            <select>
              <option>Select Category</option>
              <option>Electronics</option>
              <option>Personal</option>
              <option>Documents</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div class="input-group">
            <label>Date Lost</label>
            <input type="date">
          </div>

          <div class="input-group">
            <label>Location</label>
            <input type="text" placeholder="Where did you lose it?">
          </div>
        </div>

        <div class="input-group full">
          <label>Description</label>
          <textarea rows="4"></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Report</button>

      </form>

    </div>
  </div>

</div>

</body>
<script>
const hamburger = document.querySelector(".hamburger");
const sidebar = document.querySelector(".sidebar");

hamburger.addEventListener("click", () => {
  sidebar.classList.toggle("active");
});
</script>
</html>
