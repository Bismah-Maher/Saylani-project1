<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Portal - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
           
--green:#66b032;
    --blue:#0057a8;
    --white:#ffffff;
    --light:#f4f8fb;}

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #004e92, #00a86b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
            width: 900px;
            height: 550px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .left {
    flex: 1;
    padding: 40px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;  /* centers image and text horizontally */
}

.brand {
    flex-shrink: 0;  /* prevents the image from shrinking in column layout */
}
.brand img {
    width: 150px;
    max-width: 80%;   /* ensures it scales on mobile */
    min-width: 100px; /* prevents it from vanishing */
    height: auto;
    display: block;
    margin: 0 auto 20px auto;
}
        .left h1 { font-size: 32px; margin-bottom: 15px; }
        .left p { font-size: 14px; line-height: 1.6; opacity: 0.9; }

        /* RIGHT SIDE (The Login Box) */
        .right {
            flex: 1;
            background: var(--white);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right h2 {
            color: var(--blue);
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus { border-color: var(--blue); }

        .role-switch {
            display: flex;
            background: var(--light-gray);
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .role-switch button {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 8px;
            transition: 0.3s;
        }

        .role-switch button.active {
            background: var(--blue);
            color: white;
        }

        /* FIXED LOGIN BUTTON */
        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #0057a8, #2ecc71);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: block; /* Keeps it inside the flow */
        }

        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #7f8c8d;
        }

        .footer-text a { color: var(--green); text-decoration: none; font-weight: 700; }



        /* ================= MOBILE RESPONSIVE ================= */

@media screen and (max-width: 992px){

    .container{
        width: 95%;
        height: auto;
        flex-direction: column;
    }

    .left{
        padding: 30px 25px;
        text-align: center;
        align-items: center;
    }

    .left h1{
        font-size: 26px;
    }

    .right{
        padding: 35px 25px;
    }
}

@media screen and (max-width: 480px){

    .left h1{
        font-size: 22px;
    }

    .right h2{
        font-size: 22px;
    }

    .input-group input{
        padding: 10px;
    }

    .login-btn{
        padding: 12px;
    }
}
.brand img {
        width: 120px;
    }
    </style>
</head>
<body>

<div class="container">
    <div class="left">
        <div class="brand">
            <img src="images/images-removebg-preview.png" alt="Saylani Logo">
        </div>
        <h1>Campus Portal</h1>
        <p>
            Manage reports, complaints and events in one powerful 
            and secure platform designed for students and administrators.
        </p>
    </div>

    <div class="right">
        <h2>Login</h2>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>

        <div class="role-switch">
            <button class="active" id="studentBtn">Student</button>
            <button id="adminBtn">Admin</button>
        </div>

        <button class="login-btn" id="mainLoginBtn">Log In</button>

        <div class="footer-text">
            Don't have an account? <a href="#">Sign up</a>
        </div>
    </div>
</div>

<script>
    const buttons = document.querySelectorAll('.role-switch button');
    const loginBtn = document.getElementById('mainLoginBtn');

    // Handle Toggle
    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    // Handle Redirect Logic
    loginBtn.addEventListener('click', () => {
        const activeBtn = document.querySelector('.role-switch button.active');
        const role = activeBtn.innerText.toLowerCase();

        if (role === 'admin') {
            window.location.href = "admin.html"; // Redirects to Admin page
        } else {
            window.location.href = "student.html"; // Redirects to Student Dashboard
        }
    });
</script>

</body>
</html>
